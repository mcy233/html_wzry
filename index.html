    <!-- 加载界面内联样式（确保零额外请求即可渲染） -->
    <style>
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0e17; color: #e8eaf0;
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            transition: opacity 0.5s ease;
        }
        .loading__title {
            font-size: 32px; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(135deg, #4ea8de, #f0c040);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 6px;
        }
        .loading__subtitle {
            font-size: 13px; color: #8892a4; letter-spacing: 8px; margin-bottom: 40px;
        }
        .loading__bar-track {
            width: 260px; height: 3px; background: #1a2235;
            border-radius: 2px; overflow: hidden; position: relative;
        }
        .loading__bar-fill {
            width: 0%; height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, #4ea8de, #f0c040);
            transition: width 0.3s ease;
        }
        .loading__bar-glow {
            position: absolute; top: -2px; right: 0; width: 30px; height: 7px;
            background: radial-gradient(circle, rgba(78,168,222,0.6), transparent);
            border-radius: 50%; filter: blur(2px);
            transition: right 0.3s ease;
        }
        .loading__text {
            font-size: 11px; color: #8892a4; margin-top: 12px;
            min-height: 16px; transition: opacity 0.2s;
        }
        .loading__tip {
            position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: #4ea8de; opacity: 0.6;
            max-width: 320px; text-align: center; line-height: 1.5;
            transition: opacity 0.3s;
        }
        .loading__copyright {
            position: absolute; bottom: 18px; font-size: 10px; color: #555;
        }
        @keyframes loading-pulse {
            0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 内联加载界面：在JS解析前即可显示 -->
    <div id="loading-screen">
        <div class="loading__title">城市荣耀</div>
        <div class="loading__subtitle">KPL传奇之路</div>
        <div class="loading__bar-track">
            <div class="loading__bar-fill" id="load-bar"></div>
            <div class="loading__bar-glow" id="load-glow"></div>
        </div>
        <div class="loading__text" id="load-text" style="animation: loading-pulse 1.5s infinite">正在初始化...</div>
        <div class="loading__tip" id="load-tip"></div>
        <div class="loading__copyright">基于王者荣耀电竞IP · 由腾讯AI工具辅助开发</div>
    </div>

    <div id="game-container" class="game-container"></div>

    <script>
        if ('serviceWorker' in navigator) {
            var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
            navigator.serviceWorker.register(swPath).catch(function(){});
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
