<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 选手头像占位符 -->
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#avatarGrad)" stroke="#fff" stroke-width="3"/>
  
  <!-- 头像剪影 -->
  <circle cx="64" cy="50" r="20" fill="#fff" opacity="0.9"/>
  <ellipse cx="64" cy="95" rx="30" ry="25" fill="#fff" opacity="0.9"/>
  
  <!-- 边框装饰 -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
