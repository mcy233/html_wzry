<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 战队Logo占位符 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" stroke="#333" stroke-width="3"/>
  
  <!-- 盾牌形状 -->
  <path d="M100 30 L150 50 L150 100 Q150 140 100 170 Q50 140 50 100 L50 50 Z" 
        fill="#1a1a2e" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 星星 -->
  <polygon points="100,55 107,75 128,75 112,88 118,108 100,96 82,108 88,88 72,75 93,75" 
           fill="#FFD700"/>
  
  <!-- 文字 -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="14" 
        fill="#FFD700" text-anchor="middle" font-weight="bold">TEAM</text>
</svg>
